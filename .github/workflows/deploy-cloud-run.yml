# Continuous deployment to Cloud Run.
#
# On every push to main (and on workflow_dispatch), this workflow rebuilds
# the image, pushes it to Artifact Registry, and rolls it onto the existing
# Cloud Run service. The service URL is stable; consumers (e.g. the
# DeepInsights monorepo) never have to update their config.
#
# Auth is via Workload Identity Federation — NO long-lived service-account
# key is stored in GitHub secrets. The setup mirrors what we did for
# rbi-dbie-mcp (see that repo's .github/CLOUD_RUN_CD.md for the one-time
# GCP wiring); reuse the same WIF pool by pointing the WIF_PROVIDER /
# WIF_SA secrets at the deployer service account.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   WIF_PROVIDER   projects/<NUM>/locations/global/workloadIdentityPools/github-actions/providers/github
#   WIF_SA         browser-research-deployer@<PROJECT>.iam.gserviceaccount.com
#                  (the SA must have roles/run.admin + roles/artifactregistry.writer
#                   + roles/iam.serviceAccountUser on the Cloud Run runtime SA)
#
# Heads-up: the Chromium download in the Dockerfile is ~92 MB; full
# image is ~800 MB. Builds are cached via type=gha so steady-state CI
# turn-around stays under 5 min.

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/CLOUD_RUN_CD.md'
  workflow_dispatch:

# Cancel an in-flight deploy when a newer commit lands.
concurrency:
  group: cloud-run-deploy
  cancel-in-progress: true

env:
  PROJECT_ID: silverfox-454313
  REGION: asia-south1
  AR_REPO: agentic-rag
  SERVICE: browser-research-mcp
  IMAGE_BASE: asia-south1-docker.pkg.dev/silverfox-454313/agentic-rag/browser-research-mcp
  # Runtime config pinned here so it's reproducible in-repo. (`gcloud run deploy`
  # otherwise just preserves whatever was last set on the service by hand.)
  RUN_MEMORY: 2Gi
  RUN_EXEC_ENV: gen2
  # Secret Manager secret name backing the TAVILY_API_KEY env var (the Tavily
  # fetch fallback). See the deploy step for the one-time setup it requires.
  TAVILY_SECRET: tavily-api-key

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ github.sha }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        # ONE-TIME prerequisites — without these this step FAILS, because Cloud
        # Run validates the secret + runtime-SA access at deploy time:
        #   printf %s "<tavily key>" | gcloud secrets create $TAVILY_SECRET \
        #     --data-file=- --replication-policy=automatic --project=$PROJECT_ID
        #   RUNTIME_SA=$(gcloud run services describe $SERVICE --region=$REGION \
        #     --project=$PROJECT_ID \
        #     --format='value(spec.template.spec.serviceAccountName)')
        #   gcloud secrets add-iam-policy-binding $TAVILY_SECRET \
        #     --member="serviceAccount:$RUNTIME_SA" \
        #     --role=roles/secretmanager.secretAccessor --project=$PROJECT_ID
        # Notes: --update-secrets (not --set-secrets) leaves ANTHROPIC_API_KEY and
        # any other secrets untouched. --memory pins to $RUN_MEMORY (raise if you
        # run high concurrency). --execution-environment=gen2 is the reliable tier
        # for headless Chromium. Unspecified settings (CPU, env vars) are
        # preserved from the current revision.
        run: |
          gcloud run deploy $SERVICE \
            --image=$IMAGE_BASE:${{ github.sha }} \
            --region=$REGION \
            --project=$PROJECT_ID \
            --execution-environment=$RUN_EXEC_ENV \
            --memory=$RUN_MEMORY \
            --update-secrets=TAVILY_API_KEY=$TAVILY_SECRET:latest \
            --quiet

      - name: Smoke-test the deployed MCP
        run: |
          URL=$(gcloud run services describe $SERVICE \
            --region=$REGION --project=$PROJECT_ID \
            --format='value(status.url)')
          echo "Service URL: $URL"
          # The MCP enforces HybridAuthMiddleware — unauthed POST /mcp
          # returns 401. Pull the static bearer from Secret Manager (same
          # value bound on the service as MCP_BEARER_TOKEN).
          TOKEN=$(gcloud secrets versions access latest \
            --secret=mcp-bearer-browser --project=$PROJECT_ID)
          # The server runs in stateless HTTP mode (mcp.settings.stateless_http
          # = True in __main__.py) so initialize does NOT return an
          # Mcp-Session-Id and subsequent calls don't carry one — that's by
          # design and matches every other tool-only MCP in our fleet.
          # Verify the surface directly via tools/list.
          RESP=$(curl -fsS -X POST "$URL/mcp" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"jsonrpc":"2.0","id":"2","method":"tools/list","params":{}}')
          echo "$RESP" | head -c 400
          for T in visit extract act; do
            echo "$RESP" | grep -q "\"name\":\"$T\"" \
              || { echo "::error::tool '$T' missing from tools/list"; exit 1; }
          done
          echo "✓ smoke test passed (visit + extract + act present)"
